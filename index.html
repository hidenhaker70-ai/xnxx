<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGMA STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
        }

        .loading-container {
            width: 100%;
            max-width: 800px;
            padding: 40px 30px;
            background: rgba(10, 10, 20, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 50px;
            border: 1px solid rgba(0, 255, 200, 0.25);
            box-shadow: 0 0 60px rgba(0, 255, 200, 0.1), inset 0 0 60px rgba(0, 255, 200, 0.05);
            text-align: center;
            position: relative;
            animation: glowPulse 3s infinite alternate;
            will-change: box-shadow;
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 40px rgba(0, 255, 200, 0.1), inset 0 0 40px rgba(0, 255, 200, 0.02); }
            100% { box-shadow: 0 0 80px rgba(0, 255, 200, 0.25), inset 0 0 80px rgba(0, 255, 200, 0.08); }
        }

        .system-title {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #00ffe0, #0077ff, #00ffe0);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 3s ease-in-out infinite;
            margin-bottom: 20px;
            text-shadow: 0 0 40px rgba(0, 255, 200, 0.3);
            will-change: background-position;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .loading-sub {
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 8px;
            color: rgba(0, 255, 200, 0.6);
            margin-bottom: 35px;
            text-transform: uppercase;
        }

        .progress-wrapper {
            width: 100%;
            height: 6px;
            background: rgba(0, 255, 200, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 40px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00ffe0, #0077ff, #00ffe0);
            background-size: 200% 100%;
            border-radius: 10px;
            animation: fillProgress 5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards, shimmer 2s linear infinite;
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.6);
            will-change: width, background-position;
        }

        @keyframes fillProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .gif-container {
            width: 100%;
            max-width: 360px;
            height: auto;
            aspect-ratio: 1 / 1;
            margin: 30px auto 10px auto;
            border-radius: 30px;
            background: rgba(0, 255, 200, 0.03);
            padding: 8px;
            border: 1px solid rgba(0, 255, 200, 0.15);
            box-shadow: 0 0 50px rgba(0, 255, 200, 0.05);
            transition: all 0.5s ease;
            overflow: hidden;
            will-change: transform, border-color, box-shadow;
        }

        .gif-container:hover {
            transform: scale(1.02);
            border-color: rgba(0, 255, 200, 0.5);
            box-shadow: 0 0 80px rgba(0, 255, 200, 0.2);
        }

        .gif-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 22px;
            display: block;
            background: #0a0a0f;
            transition: filter 0.5s ease;
            will-change: filter;
        }

        .gif-container img:hover {
            filter: brightness(1.1) drop-shadow(0 0 20px rgba(0, 255, 200, 0.3));
        }

        .loading-text {
            margin-top: 25px;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 6px;
            color: rgba(0, 255, 200, 0.5);
        }

        .loading-text span {
            display: inline-block;
            animation: dotPulse 1.5s infinite;
            will-change: transform, opacity;
        }

        .loading-text span:nth-child(2) { animation-delay: 0.2s; }
        .loading-text span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
            40% { opacity: 1; transform: translateY(-5px); }
        }

        .redirect-message {
            margin-top: 20px;
            font-size: 0.7rem;
            color: rgba(0, 255, 200, 0.3);
            letter-spacing: 3px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .redirect-message.show {
            opacity: 1;
        }

        @media (max-width: 600px) {
            .loading-container { padding: 30px 20px; border-radius: 30px; margin: 20px; }
            .system-title { font-size: 1.8rem; letter-spacing: 4px; }
            .loading-sub { font-size: 0.7rem; letter-spacing: 5px; }
            .gif-container { max-width: 280px; }
        }
    </style>
</head>
<body>

<div class="loading-container">
    <div class="system-title">SIGMA SECURE</div>
    <div class="loading-sub">SYSTEM LOADING</div>

    <div class="progress-wrapper">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="gif-container">
        <img src="https://i.ibb.co.com/wh0Z9N0S/giphy-10.gif" alt="Premium System GIF" id="loadingGif">
    </div>

    <div class="loading-text">
        <span>●</span><span>●</span><span>●</span>
    </div>

    <div class="redirect-message" id="redirectMsg">⟡ WELCOME SIGMA STORE ⟡</div>
</div>

<script>
    (function() {
        'use strict';

        const LOADING_DURATION = 7000;
        const progressBar = document.getElementById('progressBar');
        const redirectMsg = document.getElementById('redirectMsg');
        const gifElement = document.getElementById('loadingGif');
        const REDIRECT_URL = 'https://premiumhk.netlify.app';

        const redirectTimer = setTimeout(function() {
            redirectMsg.classList.add('show');
            setTimeout(function() {
                window.location.href = REDIRECT_URL;
            }, 500);
        }, LOADING_DURATION);

        gifElement.onerror = function() {
            this.style.background = 'linear-gradient(135deg, #0a0a0f, #1a1a2e)';
            this.alt = 'Premium GIF';
        };

        window.addEventListener('beforeunload', function() {
            clearTimeout(redirectTimer);
        });

        console.log('Sigma Secure System: Loading complete in 5 seconds.');
    })();
</script>

</body>
</html>
