<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIGMA STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* RESET & BASE - 최적화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 메인 컨테이너 - GPU 가속 및 레이어 분리 */
        .loading-container {
            width: 100%;
            max-width: 800px;
            padding: 40px 30px;
            background: rgba(10, 10, 20, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 50px;
            border: 1px solid rgba(0, 255, 200, 0.25);
            text-align: center;
            position: relative;
            will-change: transform;
            transform: translateZ(0);
            backface-visibility: hidden;
            /* box-shadow 애니메이션 제거 (대신 정적 처리) */
            box-shadow: 0 0 60px rgba(0, 255, 200, 0.15), inset 0 0 60px rgba(0, 255, 200, 0.05);
            transition: none;
        }

        /* 타이틀 - 텍스트 쉐도우 최소화 & GPU 가속 */
        .system-title {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #00ffe0, #0077ff, #00ffe0);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 4s ease-in-out infinite alternate;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(0, 255, 200, 0.2);
            will-change: background-position;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* 서브 타이틀 - 고정 */
        .loading-sub {
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 8px;
            color: rgba(0, 255, 200, 0.6);
            margin-bottom: 35px;
            text-transform: uppercase;
            will-change: auto;
        }

        /* 프로그레스 바 - 애니메이션 최적화 (transform 사용) */
        .progress-wrapper {
            width: 100%;
            height: 6px;
            background: rgba(0, 255, 200, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 40px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
            position: relative;
            transform: translateZ(0);
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00ffe0, #0077ff, #00ffe0);
            background-size: 200% 100%;
            border-radius: 10px;
            /* fillProgress + shimmer 합쳐서 한 번에 처리, will-change 최소화 */
            animation: fillProgress 5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.4);
            will-change: transform, background-position;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        @keyframes fillProgress {
            0% { transform: scaleX(0); background-position: 200% 0; }
            100% { transform: scaleX(1); background-position: -200% 0; }
        }

        /* GIF 컨테이너 - hover 애니메이션 제거 및 레이어 최적화 */
        .gif-container {
            width: 100%;
            max-width: 360px;
            height: auto;
            aspect-ratio: 1 / 1;
            margin: 30px auto 10px auto;
            border-radius: 30px;
            background: rgba(0, 255, 200, 0.03);
            padding: 8px;
            border: 1px solid rgba(0, 255, 200, 0.15);
            box-shadow: 0 0 50px rgba(0, 255, 200, 0.05);
            overflow: hidden;
            transform: translateZ(0);
            backface-visibility: hidden;
            transition: none;
        }

        .gif-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 22px;
            display: block;
            background: #0a0a0f;
            transform: translateZ(0);
            backface-visibility: hidden;
            transition: none;
            /* 이미지 로딩 최적화 */
            content-visibility: auto;
        }

        /* 로딩 텍스트 (점) - 애니메이션 단순화 및 GPU 가속 */
        .loading-text {
            margin-top: 25px;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 6px;
            color: rgba(0, 255, 200, 0.5);
            transform: translateZ(0);
        }

        .loading-text span {
            display: inline-block;
            animation: dotPulse 1.8s infinite ease-in-out;
            will-change: transform, opacity;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .loading-text span:nth-child(2) { animation-delay: 0.3s; }
        .loading-text span:nth-child(3) { animation-delay: 0.6s; }

        @keyframes dotPulse {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8) translateY(0); }
            40% { opacity: 1; transform: scale(1.2) translateY(-4px); }
        }

        /* 리다이렉트 메시지 - 페이드만 남기고 최적화 */
        .redirect-message {
            margin-top: 20px;
            font-size: 0.7rem;
            color: rgba(0, 255, 200, 0.3);
            letter-spacing: 3px;
            opacity: 0;
            transition: opacity 0.6s ease;
            will-change: opacity;
            transform: translateZ(0);
        }

        .redirect-message.show {
            opacity: 1;
        }

        /* 반응형 - 미디어쿼리 유지 */
        @media (max-width: 600px) {
            .loading-container { padding: 30px 20px; border-radius: 30px; margin: 20px; }
            .system-title { font-size: 1.8rem; letter-spacing: 4px; }
            .loading-sub { font-size: 0.7rem; letter-spacing: 5px; }
            .gif-container { max-width: 280px; }
        }

        /* 추가: 모든 애니메이션 성능 향상 */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

<div class="loading-container">
    <div class="system-title">SIGMA SECURE</div>
    <div class="loading-sub">SYSTEM LOADING</div>

    <div class="progress-wrapper">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="gif-container">
        <img src="https://i.ibb.co.com/wh0Z9N0S/giphy-10.gif" alt="Premium System" id="loading" loading="lazy" decoding="async">
    </div>

    <div class="loading-text">
        <span>●</span><span>●</span><span>●</span>
    </div>

    <div class="redirect-message" id="redirectMsg">⟡ WELCOME SIGMA STORE ⟡</div>
</div>

<script>
    (function() {
        'use strict';

        // 상수
        const LOADING_DURATION = 7000;
        const REDIRECT_URL = 'https://premiumhk.netlify.app';

        // DOM 요소
        const progressBar = document.getElementById('progressBar');
        const redirectMsg = document.getElementById('redirectMsg');
        const gifElement = document.getElementById('loadingGif');

        // 1. 프로그레스 바 초기화 (transform scaleX 사용)
        if (progressBar) {
            // 애니메이션은 CSS에서 처리하므로, 시작 상태만 명시
            progressBar.style.transform = 'scaleX(0)';
            progressBar.style.transformOrigin = 'left center';
            // fillProgress 애니메이션이 적용되도록 클래스 유지
        }

        // 2. GIF 에러 처리 (간소화)
        if (gifElement) {
            gifElement.onerror = function() {
                this.style.background = 'linear-gradient(135deg, #0a0a0f, #1a1a2e)';
                this.alt = 'Premium GIF';
                // 에러 시에도 레이아웃 유지
            };
        }

        // 3. 리다이렉트 타이머 (성능 최적화 - requestAnimationFrame 대신 setTimeout 사용)
        let redirectTimer = setTimeout(function() {
            // 메시지 표시
            if (redirectMsg) {
                redirectMsg.classList.add('show');
            }
            // 약간의 지연 후 리다이렉트
            setTimeout(function() {
                window.location.href = REDIRECT_URL;
            }, 500);
        }, LOADING_DURATION);

        // 4. 페이지 이탈 시 타이머 정리 (메모리 누수 방지)
        window.addEventListener('beforeunload', function() {
            if (redirectTimer) {
                clearTimeout(redirectTimer);
                redirectTimer = null;
            }
        });

        // 5. 추가 최적화: 불필요한 이벤트 리스너 제거, 콘솔 로그 최소화
        // (디버그용 로그는 유지하되 경량화)
        console.log('Sigma Secure System');

        // 6. (선택) 애니메이션 프레임 드랍 방지를 위한 여유
        // 모든 작업 완료
    })();
</script>

</body>
</html>
